<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールアドレス変更完了 — BizRadar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 440px; padding: 0 16px; }
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 1.8rem; font-weight: 700; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); padding: 32px 28px; text-align: center; }
    a { color: #3949ab; text-decoration: none; font-weight: 600; }
  </style>
  <link rel="stylesheet" href="/static/base.css">
</head>
<body>
  <div class="wrap">
    <div class="header"><h1>BizRadar</h1></div>
    <div class="card">
      <div style="font-size:0.95rem;font-weight:600;margin-bottom:12px;">メールアドレスの変更が完了しました</div>
      <div style="font-size:0.85rem;color:#6b7280;line-height:1.6;">
        新しいメールアドレス: <strong style="color:#1a1a2e;">{{ new_email }}</strong><br>
        今後はこのアドレスでログインしてください。
      </div>
      {% if need_relogin %}
      <div style="margin-top:12px;font-size:0.82rem;color:#92400e;background:#fefce8;padding:8px 12px;border-radius:6px;">
        安全のため、新しいメールアドレスで再度ログインしてください。
      </div>
      <div style="margin-top:16px;"><a href="/login">ログイン</a></div>
      {% else %}
      <div style="margin-top:16px;"><a href="/settings">設定に戻る</a></div>
      {% endif %}
    </div>
  </div>
<footer style="text-align:center; padding:24px 16px; font-size:0.78rem; color:#9ca3af; margin-top:16px;">
  <a href="/terms" style="color:#9ca3af; text-decoration:none; margin:0 8px;">利用規約</a>
  <span style="color:#d1d5db;">|</span>
  <a href="/privacy" style="color:#9ca3af; text-decoration:none; margin:0 8px;">プライバシーポリシー</a>
</footer>
</body>
</html>
