<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ — BizRadar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; }
    header a { color: #8892b0; text-decoration: none; font-size: 0.85rem; }
    header a:hover { color: #fff; }
    main {
      max-width: 560px;
      margin: 40px auto;
      padding: 0 16px 48px;
    }
    .page-title {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-title h2 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 36px 32px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a4a6a;
      margin-bottom: 6px;
    }
    .form-group label .req { color: #dc2626; margin-left: 3px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      color: #1a1a2e;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #3949ab; }
    .form-group textarea { min-height: 140px; resize: vertical; }
    .btn-submit {
      width: 100%;
      padding: 11px;
      background: #3949ab;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-submit:hover { background: #2d3a8c; }
    .alert-error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
    .alert-success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
    footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 0.78rem;
      color: #9ca3af;
    }
    footer a { color: #9ca3af; text-decoration: none; margin: 0 8px; }
  </style>
  <link rel="stylesheet" href="/static/base.css">
</head>
<body>
  <header>
    <h1>BizRadar</h1>
    <a href="{{ back_url }}">&larr; 戻る</a>
  </header>

  <main>
    <div class="page-title">
      <h2>お問い合わせ</h2>
    </div>

    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for msg_category, message in messages %}
        <div class="alert-{{ 'success' if msg_category == 'success' else 'error' }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      {% if error %}
      <div class="alert-error">{{ error }}</div>
      {% endif %}

      <p style="font-size:0.82rem;color:#9ca3af;margin-bottom:14px;">よくある操作方法のご質問は、画面右下のチャットでもお答えできます。</p>
      <form method="POST" action="/contact">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label>お名前<span class="req">*</span></label>
          <input type="text" name="name" value="{{ name or '' }}" required autofocus>
        </div>
        <div class="form-group">
          <label>メールアドレス<span class="req">*</span></label>
          <input type="email" name="email" value="{{ email or '' }}" required>
        </div>
        <div class="form-group">
          <label>会社名</label>
          <input type="text" name="company" value="{{ company or '' }}">
        </div>
        <div class="form-group">
          <label>お問い合わせ種別<span class="req">*</span></label>
          <select name="category" required>
            <option value="">選択してください</option>
            {% for opt in ["プランについて", "操作方法について", "請求・お支払いについて", "その他"] %}
            <option value="{{ opt }}"{% if sel_category == opt %} selected{% endif %}>{{ opt }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>お問い合わせ内容<span class="req">*</span></label>
          <textarea name="body" required>{{ body or '' }}</textarea>
        </div>
        <button type="submit" class="btn-submit">送信する</button>
      </form>
    </div>
  </main>

  <footer>
    <a href="/terms">利用規約</a>
    <span style="color:#d1d5db;">|</span>
    <a href="/privacy">プライバシーポリシー</a>
    <span style="color:#d1d5db;">|</span>
    <a href="/contact">お問い合わせ</a>
  </footer>
</body>
</html>
