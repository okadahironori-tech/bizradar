<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRadar — パスワードのリセット</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5; color: #1a1a2e;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .wrap { width: 100%; max-width: 400px; padding: 0 16px; }
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; letter-spacing: 0.04em; }
    .header p  { font-size: 0.82rem; color: #8892b0; margin-top: 4px; }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10); padding: 32px 28px;
    }
    .card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
    .card p  { font-size: 0.87rem; color: #6b7280; margin-bottom: 20px; line-height: 1.6; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: #4a4a6a; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #d1d5db; border-radius: 8px;
      font-size: 0.95rem; outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #3949ab; }
    .btn {
      width: 100%; padding: 11px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 8px; font-size: 0.95rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #2d2d4e; }
    .error {
      background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5;
      border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 18px;
    }
    .invalid {
      background: #fff7ed; color: #92400e; border: 1px solid #fcd34d;
      border-radius: 8px; padding: 14px; font-size: 0.87rem; line-height: 1.6;
    }
    .back { text-align: center; margin-top: 18px; font-size: 0.85rem; color: #6b7280; }
    .back a { color: #3949ab; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>BizRadar</h1>
      <p>ウェブサイト変更検知モニター</p>
    </div>
    <div class="card">
      {% if invalid %}
      <div class="invalid">
        このリンクは無効または期限切れです。<br>
        再度パスワードリセットをお申し込みください。
      </div>
      {% else %}
      <h2>新しいパスワードの設定</h2>
      <p>8文字以上の新しいパスワードを入力してください。</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/reset-password/{{ token }}">
        <div class="form-group">
          <label for="password">新しいパスワード</label>
          <input type="password" id="password" name="password"
                 autocomplete="new-password" minlength="8" autofocus required>
        </div>
        <div class="form-group">
          <label for="password2">新しいパスワード（確認）</label>
          <input type="password" id="password2" name="password2"
                 autocomplete="new-password" minlength="8" required>
        </div>
        <button type="submit" class="btn">パスワードを変更する</button>
      </form>
      {% endif %}
    </div>
    <p class="back"><a href="/login">← ログイン画面に戻る</a></p>
  </div>
</body>
</html>
