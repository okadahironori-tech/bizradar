<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRadar — アカウント登録</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 0 16px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.04em;
    }
    .login-header p {
      font-size: 0.82rem;
      color: #8892b0;
      margin-top: 4px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 32px 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a4a6a;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      color: #1a1a2e;
    }
    .form-group input:focus {
      border-color: #3949ab;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #2d2d4e; }

    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }

    .login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #6b7280;
    }
    .login-link a {
      color: #3949ab;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover { text-decoration: underline; }

    .plan-options { display: flex; flex-direction: column; gap: 8px; }
    .plan-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .plan-option:hover { border-color: #3949ab; }
    .plan-option input[type="radio"] { margin-top: 3px; flex-shrink: 0; }
    .plan-option input[type="radio"]:checked + .plan-body .plan-name { color: #3949ab; }
    .plan-option:has(input:checked) { border-color: #3949ab; background: #f5f7ff; }
    .plan-body { display: flex; flex-direction: column; gap: 2px; }
    .plan-name { font-size: 0.92rem; font-weight: 700; color: #1a1a2e; }
    .plan-price { font-size: 0.82rem; color: #4a4a6a; }
    .plan-desc { font-size: 0.76rem; color: #6b7280; line-height: 1.4; }
  </style>
  <link rel="stylesheet" href="/static/base.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <h1>BizRadar</h1>
      <p>アカウント登録</p>
    </div>
    <div class="card">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" autocomplete="email" autofocus required>
        </div>
        <div class="form-group">
          <label for="password">パスワード（6文字以上）</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">パスワード（確認）</label>
          <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label>プラン</label>
          <div class="plan-options">
            <label class="plan-option">
              <input type="radio" name="plan" value="basic" checked>
              <span class="plan-body">
                <span class="plan-name">ベーシック</span>
                <span class="plan-price">980円/月</span>
                <span class="plan-desc">企業5社・キーワード10・メール通知</span>
              </span>
            </label>
            <label class="plan-option">
              <input type="radio" name="plan" value="business">
              <span class="plan-body">
                <span class="plan-name">ビジネス</span>
                <span class="plan-price">2,980円/月</span>
                <span class="plan-desc">企業30社・キーワード30・メールに加えLINE/Slack通知（準備中）・AI重要度スコアリング・AI記事要約</span>
              </span>
            </label>
            <label class="plan-option">
              <input type="radio" name="plan" value="pro">
              <span class="plan-body">
                <span class="plan-name">Pro</span>
                <span class="plan-price">9,800円/月</span>
                <span class="plan-desc">企業500社・キーワード50・TDnet・メールに加えLINE/Slack通知（準備中）・AI重要度スコアリング・AI記事要約</span>
              </span>
            </label>
          </div>
        </div>
        <button type="submit" class="btn-login">アカウントを作成</button>
      </form>
      <p class="login-link" style="margin-top:18px;">
        すでにアカウントをお持ちの方は <a href="/login">ログイン</a>
      </p>
    </div>
    <p style="text-align:center; margin-top:20px; font-size:0.78rem; color:#9ca3af;">
      <a href="/terms" style="color:#9ca3af; text-decoration:none; margin:0 6px;">利用規約</a>
      <span style="color:#d1d5db;">|</span>
      <a href="/privacy" style="color:#9ca3af; text-decoration:none; margin:0 6px;">プライバシーポリシー</a>
    </p>
  </div>
</body>
</html>
