<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRadar — アカウント登録</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 400px; padding: 0 16px; }
    .login-header { text-align: center; margin-bottom: 28px; }
    .login-header h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; letter-spacing: 0.04em; }
    .login-header p { font-size: 0.82rem; color: #8892b0; margin-top: 4px; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); padding: 32px 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #4a4a6a; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; color: #1a1a2e; }
    .form-group input:focus { border-color: #3949ab; }
    .btn-login { width: 100%; padding: 11px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 6px; }
    .btn-login:hover { background: #2d2d4e; }
    .error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 18px; }
    .login-link { text-align: center; margin-top: 16px; font-size: 0.85rem; color: #6b7280; }
    .login-link a { color: #3949ab; text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-decoration: underline; }
  </style>
  <link rel="stylesheet" href="/static/base.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <h1>BizRadar</h1>
      <p>アカウント登録</p>
    </div>
    <div class="card">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" autocomplete="email" autofocus required>
        </div>
        <button type="submit" class="btn-login">確認メールを送信</button>
      </form>
    </div>
    <div class="login-link">
      既にアカウントをお持ちの方は <a href="/login">ログイン</a>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:0.78rem;color:#9ca3af;">
      <a href="/terms" style="color:#9ca3af;text-decoration:none;">利用規約</a> ・
      <a href="/privacy" style="color:#9ca3af;text-decoration:none;">プライバシーポリシー</a>
    </div>
  </div>
<footer style="text-align:center; padding:24px 16px; font-size:0.78rem; color:#9ca3af; margin-top:16px;">
  <a href="/terms" style="color:#9ca3af; text-decoration:none; margin:0 8px;">利用規約</a>
  <span style="color:#d1d5db;">|</span>
  <a href="/privacy" style="color:#9ca3af; text-decoration:none; margin:0 8px;">プライバシーポリシー</a>
</footer>
</body>
</html>
