<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRadar — 無効なトークン</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 400px; padding: 0 16px; }
    .login-header { text-align: center; margin-bottom: 28px; }
    .login-header h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; letter-spacing: 0.04em; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); padding: 32px 28px; text-align: center; }
    a { color: #3949ab; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <h1>BizRadar</h1>
    </div>
    <div class="card">
      <div style="font-size:0.95rem;font-weight:600;color:#991b1b;margin-bottom:12px;">無効または期限切れのリンクです</div>
      <div style="font-size:0.85rem;color:#6b7280;line-height:1.6;margin-bottom:16px;">
        このURLは無効か、有効期限が切れています。<br>お手数ですが、再度登録をお試しください。
      </div>
      <a href="/register">新規登録ページへ</a>
    </div>
  </div>
</body>
</html>
