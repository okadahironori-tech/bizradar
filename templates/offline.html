<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRadar — オフライン</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5; color: #1a1a2e;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 40px 32px; text-align: center; max-width: 360px; width: 100%;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 0.88rem; color: #6b7280; line-height: 1.6; margin-bottom: 20px; }
    .btn {
      display: inline-block; padding: 10px 24px;
      background: #1a1a2e; color: #fff; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: background 0.15s;
    }
    .btn:hover { background: #2d2d4e; }
  </style>
  <link rel="stylesheet" href="/static/base.css">
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>オフラインです</h1>
    <p>インターネットに接続されていません。<br>接続を確認してから再度お試しください。</p>
    <a class="btn" href="/" onclick="location.reload(); return false;">再読み込み</a>
  </div>
</body>
</html>
