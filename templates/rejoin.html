<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRadar — 再入会</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 400px; padding: 0 16px; }
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 1.8rem; font-weight: 700; }
    .header p { font-size: 0.82rem; color: #8892b0; margin-top: 4px; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); padding: 32px 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #4a4a6a; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; color: #1a1a2e; }
    .form-group input:focus { border-color: #3949ab; }
    .btn-login { width: 100%; padding: 11px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 6px; }
    .btn-login:hover { background: #2d2d4e; }
    .flash { padding: 10px 16px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 16px; }
    .flash-error, .flash-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .info { font-size: 0.82rem; color: #6b7280; margin-bottom: 18px; line-height: 1.6; }
    .link { text-align: center; margin-top: 16px; font-size: 0.85rem; color: #6b7280; }
    .link a { color: #3949ab; text-decoration: none; font-weight: 600; }
  </style>
  <link rel="stylesheet" href="/static/base.css">
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>BizRadar</h1>
      <p>再入会</p>
    </div>
    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
      {% endwith %}
      <div class="info">
        退会済みのアカウントに再入会します。<br>
        以前のメールアドレスとパスワードを入力してください。<br>
        設定やデータはそのまま引き継がれます。
      </div>
      <form method="POST" action="/rejoin">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" name="email" value="{{ email }}" required autofocus>
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-login">再入会する</button>
      </form>
    </div>
    <div class="link">
      新規登録の方は <a href="/register">こちら</a>
    </div>
  </div>
</body>
</html>
