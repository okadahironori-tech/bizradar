<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizRadar — ログイン</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 0 16px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.04em;
    }
    .login-header p {
      font-size: 0.82rem;
      color: #8892b0;
      margin-top: 4px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 32px 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a4a6a;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      color: #1a1a2e;
    }
    .form-group input:focus {
      border-color: #3949ab;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #2d2d4e; }

    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <h1>BizRadar</h1>
      <p>ウェブサイト変更検知モニター</p>
    </div>
    <div class="card">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/login">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-group">
          <label for="username">メールアドレス</label>
          <input type="email" id="username" name="username" autocomplete="email" autofocus required>
        </div>
        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">ログイン</button>
      </form>
      {% if request.args.get('reset') %}
      <div style="background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-top:16px;">
        パスワードを変更しました。新しいパスワードでログインしてください。
      </div>
      {% endif %}
      <p style="text-align:center; margin-top:18px; font-size:0.85rem; color:#6b7280;">
        <a href="/forgot-password" style="color:#3949ab; text-decoration:none;">パスワードをお忘れの方はこちら</a>
      </p>
      <p style="text-align:center; margin-top:8px; font-size:0.85rem; color:#6b7280;">
        アカウントをお持ちでない方は <a href="/register" style="color:#3949ab; text-decoration:none; font-weight:600;">新規登録</a>
      </p>
    </div>
    <p style="text-align:center; margin-top:20px; font-size:0.78rem; color:#9ca3af;">
      <a href="/terms" style="color:#9ca3af; text-decoration:none; margin:0 6px;">利用規約</a>
      <span style="color:#d1d5db;">|</span>
      <a href="/privacy" style="color:#9ca3af; text-decoration:none; margin:0 6px;">プライバシーポリシー</a>
    </p>
  </div>
</body>
</html>
