databases:
  - name: bizradar-db
    databaseName: bizradar
    user: bizradar
    plan: free

services:
  - type: web
    name: bizradar
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bizradar-db
          property: connectionString
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
